<!DOCTYPE html>
<html lang="en">
<head>

    <title>MoBros Lawn Care</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background: #0077cc;
            color: white;
            padding: 15px;

        nav a {
            color: white;
            margin: 0 15px;

        .container {

        section {

            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
